<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thiệp cưới</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body class="landing-body">

    <!-- Dữ liệu dùng chung -->
    <script src="info.js"></script>

    <main class="landing-card">
        <p class="landing-eyebrow" data-bind="title"></p>

        <div class="landing-couple">
            <h1 class="landing-name script" data-bind="groom.name"></h1>
            <div class="landing-amp">&amp;</div>
            <h1 class="landing-name script" data-bind="bride.name"></h1>
        </div>

        <ul class="event-list" data-event-list></ul>

        <p class="landing-footer" data-bind="landing.footer"></p>
    </main>


    <!-- =============================================================
         SCRIPT: render danh sách sự kiện & bind label
         ============================================================= -->
    <script>
        (function () {
            const byPath = (obj, path) =>
                path.split(".").reduce((o, k) => (o == null ? undefined : o[k]), obj);

            document.title = info.pageTitle || document.title;

            /* Bind các text đơn */
            document.querySelectorAll("[data-bind]").forEach((el) => {
                const v = byPath(info, el.dataset.bind);
                if (v !== undefined && v !== null) el.textContent = String(v);
            });

            /* Render danh sách event */
            const list = document.querySelector("[data-event-list]");
            if (list && Array.isArray(info.events)) {
                list.innerHTML = info.events.map((ev, idx) => `
                    <li class="event-card-wrap" style="animation-delay:${0.2 + idx * 0.15}s">
                        <a class="event-card" href="thiep.html?event=${encodeURIComponent(ev.id)}">
                            <h2 class="event-name">${ev.name}</h2>
                            <p class="event-date">${ev.date || ""}</p>
                            <p class="event-date-al">${ev.date_al || ""}</p>
                            <span class="event-cta">Xem thiệp &rarr;</span>
                        </a>
                    </li>
                `).join("");
            }
        })();
    </script>

</body>

</html>
