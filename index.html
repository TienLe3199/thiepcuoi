<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thiệp cưới</title>

    <link rel="icon" type="image/png" href="assets/marriage.png">
    <link rel="apple-touch-icon" href="assets/marriage.png">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="landing-body">

    <!-- =============================================================
         Thứ tự script QUAN TRỌNG:
            info.js          : dữ liệu chung
            loader.js        : màn loading
            bg-rotator.js    : ảnh nền xoay vòng
            countdown.js     : block đếm ngược (phơi window.renderCountdown)
            music.js         : audio + nút bật/tắt (capture-handler kick-start)
            page-landing.js  : window.renderLandingPage()
            page-detail.js   : window.renderDetailPage() — tải sẵn để SPA
                               chuyển sang `thiep.html` không cần fetch script
            transitions.js   : curtain fallback khi browser chưa hỗ trợ
                               View Transitions (chỉ chạy lúc load đầu)
            spa.js           : soft-navigation — phải đứng SAU music.js
                               để click capture-handler của music.js (bật
                               nhạc) đăng ký trước, vẫn chạy khi user click.
         ============================================================= -->
    <script src="js/info.js"></script>
    <script src="js/loader.js"></script>
    <script src="js/bg-rotator.js"></script>
    <script src="js/countdown.js"></script>
    <script src="js/music.js"></script>
    <script src="js/page-landing.js"></script>
    <script src="js/page-detail.js"></script>
    <script src="js/transitions.js"></script>
    <script src="js/spa.js"></script>

    <a href="#" class="side-switch" data-side-toggle aria-label="Chuyển phía hiển thị"></a>

    <main class="landing-card">
        <p class="landing-eyebrow" data-bind="title"></p>

        <div class="landing-couple">
            <h1 class="landing-name script" data-bind="groom.name"></h1>
            <div class="landing-amp">&amp;</div>
            <h1 class="landing-name script" data-bind="bride.name"></h1>
        </div>

        <ul class="event-list" data-event-list></ul>

        <p class="landing-footer" data-bind="landing.footer"></p>
    </main>

</body>

</html>
